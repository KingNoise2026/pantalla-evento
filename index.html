<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pantalla Evento PRO</title>

<!-- 🔥 anti cache -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family: Arial, sans-serif;
  text-align:center;
}

.reloj {
  font-size:90px;
  font-weight:bold;
}

.container {
  display:flex;
  flex-direction:column;
  height:85vh;
}

.bloque { padding:20px; }

.titulo { font-size:45px; margin-bottom:10px; }

.ahora { background:#8B0000; }
.sigue { background:#B8860B; }

.prep {
  background:#1E3A8A;
  overflow:hidden;
  position:relative;
  height:35vh;
}

.scroll-content {
  position:absolute;
  width:100%;
  transition: transform 0.6s ease;
}

.item {
  font-size:48px;
  margin:12px 0;
}

.hora {
  font-size:36px;
  color:#ccc;
  display:block;
}

.status {
  position:fixed;
  top:10px;
  right:10px;
  font-size:14px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="status" id="status">Conectando...</div>
<div class="reloj" id="reloj"></div>

<div class="container">

<div class="bloque ahora">
<div class="titulo">EN ESCENARIO AHORA</div>
<div id="ahora"></div>
</div>

<div class="bloque sigue">
<div class="titulo">SIGUE</div>
<div id="sigue"></div>
</div>

<div class="bloque prep">
<div class="titulo">EN PREPARACIÓN</div>
<div id="prep"></div>
</div>

</div>

<script>

const BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRbNs0WU7BmaRXSQ0Bf9eS1DVIQ6yOmRTRio3Nx7yIZGbOLTmGL0JzI3XCiZeVvaQW4W222iY-W8dNV/pub?output=csv";

let eventos = [];
let indexScroll = 0;

// 🔥 cargar datos
async function cargarEventos(){
  try {
    const res = await fetch(BASE_URL + "&v=" + Date.now());
    const text = await res.text();

    const filas = text
      .replace(/\r/g, "")
      .split("\n")
      .map(f => f.trim())
      .filter(f => f.length > 3);

    const data = filas.map(f=>{
      const columnas = f.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

      return {
        inicio: columnas[0]?.replace(/"/g,"").trim(),
        fin: columnas[1]?.replace(/"/g,"").trim() || null,
        nombre: columnas.slice(2).join(",").replace(/"/g,"").trim()
      };
    }).filter(e => e.inicio && e.nombre);

    document.getElementById("status").innerText = "🟢 Conectado";
    return data;

  } catch(e){
    document.getElementById("status").innerText = "🔴 Sin conexión";
    return eventos;
  }
}

// utilidades
function horaAminutos(h){
  const [hh,mm]=h.split(":").map(Number);
  return hh*60+mm;
}

// 🔥 SOLO RELOJ (independiente)
function actualizarReloj(){
  const now = new Date();
  document.getElementById("reloj").innerText =
    now.toLocaleTimeString("es-CL");
}

// render (NO cada segundo)
function actualizar(){
  const now = new Date();
  const minutos = now.getHours()*60 + now.getMinutes();

  eventos.sort((a,b)=>horaAminutos(a.inicio)-horaAminutos(b.inicio));

  let actuales=[], futuros=[];

  eventos.forEach(e=>{
    let ini = horaAminutos(e.inicio);
    let fin = e.fin ? horaAminutos(e.fin) : ini+15;

    if(minutos>=ini && minutos<=fin) actuales.push(e);
    if(minutos<ini) futuros.push(e);
  });

  document.getElementById("ahora").innerHTML =
    actuales.map(e=>`<div class="item">${e.nombre}<span class="hora">${e.inicio}</span></div>`).join("") || "SIN ACTIVIDAD";

  document.getElementById("sigue").innerHTML =
    futuros[0] ? `<div class="item">${futuros[0].nombre}<span class="hora">${futuros[0].inicio}</span></div>` : "—";

  let lista = futuros.slice(1);

  let html = lista.map(e=>`
    <div class="item">${e.nombre}
      <span class="hora">${e.inicio}</span>
    </div>
  `).join("");

  document.getElementById("prep").innerHTML =
    `<div class="scroll-content">${html}</div>`;

  // 🔥 RESET SCROLL CUANDO CAMBIAN DATOS
  indexScroll = 0;
}

// 🔥 scroll por pasos (estable)
function scrollPorPasos(){
  const cont = document.querySelector(".scroll-content");
  if(!cont) return;

  const items = cont.children;
  if(items.length === 0) return;

  indexScroll++;
  if(indexScroll >= items.length) indexScroll = 0;

  const altura = items[0].offsetHeight + 12;

  cont.style.transform = `translateY(-${indexScroll * altura}px)`;
}

// 🚀 inicio
async function init(){
  eventos = await cargarEventos();
  actualizar();
}

// reloj SIEMPRE fluido
setInterval(actualizarReloj, 1000);

// datos + render
setInterval(async ()=>{
  eventos = await cargarEventos();
  actualizar();
}, 10000);

// scroll lento y legible
setInterval(scrollPorPasos, 4000);

// 🔥 AUTO REFRESH (anti cache real)
setInterval(() => {
  location.reload();
}, 60000);

init();

</script>

</body>
</html>
