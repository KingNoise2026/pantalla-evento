<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pantalla Evento LIVE</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family: Arial, sans-serif;
  text-align:center;
}

.reloj {
  font-size:100px;
  font-weight:bold;
}

.container {
  display:flex;
  flex-direction:column;
  height:85vh;
}

.bloque { padding:20px; }

.titulo { font-size:45px; margin-bottom:10px; }

.ahora { background:#8B0000; }
.sigue { background:#B8860B; }

/* 🔥 ZONA SCROLL */
.prep {
  background:#1E3A8A;
  overflow:hidden;
  position:relative;
  height:35vh;
}

.scroll-content {
  position:absolute;
  width:100%;
  animation: scrollVertical linear infinite;
}

@keyframes scrollVertical {
  0% { transform: translateY(0); }
  100% { transform: translateY(-50%); }
}

.item { font-size:50px; margin:15px 0; }

.hora {
  font-size:40px;
  color:#ccc;
  display:block;
}

.progress {
  width:80%;
  height:15px;
  background:#333;
  margin:10px auto;
  border-radius:10px;
  overflow:hidden;
}

.progress-bar {
  height:100%;
  background:#00ff88;
  width:0%;
}

.countdown {
  font-size:30px;
  color:#00ff88;
}

.status {
  position:fixed;
  top:10px;
  right:10px;
  font-size:14px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="status" id="status">Conectando...</div>

<div class="reloj" id="reloj"></div>

<div class="container">

<div class="bloque ahora">
<div class="titulo">EN ESCENARIO AHORA</div>
<div id="ahora"></div>
<div class="progress"><div class="progress-bar" id="barra"></div></div>
<div class="countdown" id="countdown"></div>
</div>

<div class="bloque sigue">
<div class="titulo">SIGUE</div>
<div id="sigue"></div>
</div>

<div class="bloque prep">
<div class="titulo">EN PREPARACIÓN</div>
<div id="prep"></div>
</div>

</div>

<script>

const BASE_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRbNs0WU7BmaRXSQ0Bf9eS1DVIQ6yOmRTRio3Nx7yIZGbOLTmGL0JzI3XCiZeVvaQW4W222iY-W8dNV/pub?output=csv";

const DURACION_DEFAULT = 15;
let eventos = [];

async function cargarEventos(){
  try {
    const res = await fetch(BASE_URL + "&v=" + Date.now());
    const text = await res.text();

    const filas = text.split(/\r?\n/).filter(f => f.trim());

    const data = filas.map(f=>{
      const columnas = f.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g) || [];

      return {
        inicio: columnas[0]?.replace(/"/g,"").trim(),
        fin: columnas[1]?.replace(/"/g,"").trim() || null,
        nombre: columnas.slice(2).join(",").replace(/"/g,"").trim()
      };
    }).filter(e => e && e.inicio && e.nombre);

    document.getElementById("status").innerText = "🟢 Conectado";
    return data;

  } catch(e){
    document.getElementById("status").innerText = "🔴 Sin conexión";
    return eventos;
  }
}

function horaAminutos(h){
  const [hh,mm]=h.split(":").map(Number);
  return hh*60+mm;
}

function obtenerFin(e){
  return e.fin ? horaAminutos(e.fin) : horaAminutos(e.inicio)+DURACION_DEFAULT;
}

function formatoHora(e){
  if(e.fin) return `${e.inicio} - ${e.fin}`;
  let f = obtenerFin(e);
  return `${e.inicio} - ${String(Math.floor(f/60)).padStart(2,"0")}:${String(f%60).padStart(2,"0")}`;
}

function actualizar(){
  const now = new Date();
  const minutos = now.getHours()*60 + now.getMinutes();

  document.getElementById("reloj").innerText =
    now.toLocaleTimeString("es-CL");

  eventos.sort((a,b)=>horaAminutos(a.inicio)-horaAminutos(b.inicio));

  let actuales=[], futuros=[];

  eventos.forEach(e=>{
    let ini = horaAminutos(e.inicio);
    let fin = obtenerFin(e);

    if(minutos>=ini && minutos<=fin) actuales.push(e);
    if(minutos<ini) futuros.push(e);
  });

  document.getElementById("ahora").innerHTML =
    actuales.map(e=>`<div class="item">${e.nombre}<span class="hora">${formatoHora(e)}</span></div>`).join("") || "SIN ACTIVIDAD";

  document.getElementById("sigue").innerHTML =
    futuros[0] ? `<div class="item">${futuros[0].nombre}<span class="hora">${formatoHora(futuros[0])}</span></div>` : "—";

  // 🔥 SCROLL AUTOMÁTICO
  let lista = futuros.slice(1);

  let html = lista.map(e=>`
    <div class="item">${e.nombre}
      <span class="hora">${formatoHora(e)}</span>
    </div>
  `).join("");

  // duplicar contenido para loop infinito suave
  document.getElementById("prep").innerHTML =
    `<div class="scroll-content">${html + html}</div>`;

  // velocidad según cantidad
  const duracion = Math.max(10, lista.length * 3);
  document.querySelector(".scroll-content").style.animationDuration = duracion + "s";

  // barra progreso
  if(actuales[0]){
    let ini = horaAminutos(actuales[0].inicio);
    let fin = obtenerFin(actuales[0]);

    let porcentaje = ((minutos-ini)/(fin-ini))*100;

    document.getElementById("barra").style.width =
      Math.max(0, Math.min(100, porcentaje)) + "%";

    document.getElementById("countdown").innerText =
      "Termina en " + Math.max(0,(fin-minutos)) + " min";
  }
}

async function init(){
  eventos = await cargarEventos();
  actualizar();
}

setInterval(actualizar, 1000);

setInterval(async ()=>{
  eventos = await cargarEventos();
}, 10000);

init();

</script>

</body>
</html>
