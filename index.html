<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pantalla Evento LIVE</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family: Arial, sans-serif;
  text-align:center;
}

.reloj {
  font-size:120px;
  font-weight:bold;
  margin:10px 0;
}

.container {
  display:flex;
  flex-direction:column;
  justify-content:space-around;
  height:85vh;
}

.bloque {
  padding:20px;
}

.titulo {
  font-size:55px;
  margin-bottom:15px;
}

.ahora { background:#8B0000; }
.sigue { background:#B8860B; }
.prep { background:#1E3A8A; }

.item {
  font-size:75px;
  margin:25px 0;
}

.hora {
  font-size:65px;
  color:#ccc;
  font-weight:bold;
  display:block;
  margin-top:10px;
}

.progress {
  width:80%;
  height:20px;
  background:#333;
  margin:15px auto;
  border-radius:10px;
  overflow:hidden;
}

.progress-bar {
  height:100%;
  background:#00ff88;
  width:0%;
  transition: width 1s linear;
}

.countdown {
  font-size:40px;
  margin-top:10px;
  color:#00ff88;
}
</style>
</head>

<body>

<div class="reloj" id="reloj"></div>

<div class="container">

<div class="bloque ahora">
<div class="titulo">EN ESCENARIO AHORA</div>
<div id="ahora"></div>
<div class="progress"><div class="progress-bar" id="barra"></div></div>
<div class="countdown" id="countdown"></div>
</div>

<div class="bloque sigue">
<div class="titulo">SIGUE</div>
<div id="sigue"></div>
</div>

<div class="bloque prep">
<div class="titulo">EN PREPARACIÓN</div>
<div id="prep"></div>
</div>

</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRbNs0WU7BmaRXSQ0Bf9eS1DVIQ6yOmRTRio3Nx7yIZGbOLTmGL0JzI3XCiZeVvaQW4W222iY-W8dNV/pub?output=csv";

const DURACION_DEFAULT = 15;

let eventos = [];
let cacheAhora = "";
let cacheSigue = "";
let cachePrep = "";

// 🔥 LECTOR CSV ROBUSTO
async function cargarEventos(){
  try {
    const res = await fetch(URL);
    const text = await res.text();

    console.log("CSV RAW:", text); // para debug

    const filas = text.split(/\r?\n/).slice(1);

    return filas.map(f=>{
      if(!f.trim()) return null;

      const columnas = f.split(",");

      const inicio = columnas[0]?.replace(/"/g,"").trim();
      const fin    = columnas[1]?.replace(/"/g,"").trim();
      const nombre = columnas.slice(2).join(",").replace(/"/g,"").trim();

      return {
        inicio: inicio,
        fin: fin || null,
        nombre: nombre
      };

    }).filter(e => e && e.inicio && e.nombre);

  } catch(e){
    console.error("Error cargando CSV:", e);
    return eventos;
  }
}

function horaAminutos(h){
  const [hh,mm]=h.split(":").map(Number);
  return hh*60+mm;
}

function obtenerFin(e){
  if(e.fin) return horaAminutos(e.fin);
  return horaAminutos(e.inicio) + DURACION_DEFAULT;
}

function formatoHora(e){
  if(e.fin) return `${e.inicio} - ${e.fin}`;
  let finCalc = obtenerFin(e);
  let hh = Math.floor(finCalc/60).toString().padStart(2,"0");
  let mm = (finCalc%60).toString().padStart(2,"0");
  return `${e.inicio} - ${hh}:${mm}`;
}

function actualizar(){

  const now = new Date();
  const minutos = now.getHours()*60 + now.getMinutes();

  document.getElementById("reloj").innerText =
    now.toLocaleTimeString("es-CL");

  let actuales = [];
  let futuros = [];

  eventos.forEach(e=>{
    let ini = horaAminutos(e.inicio);
    let fin = obtenerFin(e);

    if(minutos>=ini && minutos<=fin){
      actuales.push(e);
    }
    if(minutos<ini){
      futuros.push(e);
    }
  });

  futuros.sort((a,b)=>horaAminutos(a.inicio)-horaAminutos(b.inicio));

  let htmlAhora = actuales.length
    ? actuales.map(e=>`
        <div class="item">
          ${e.nombre}
          <span class="hora">${formatoHora(e)}</span>
        </div>
      `).join("")
    : "—";

  if(htmlAhora !== cacheAhora){
    document.getElementById("ahora").innerHTML = htmlAhora;
    cacheAhora = htmlAhora;
  }

  let htmlSigue = futuros.length
    ? `<div class="item">
         ${futuros[0].nombre}
         <span class="hora">${formatoHora(futuros[0])}</span>
       </div>`
    : "—";

  if(htmlSigue !== cacheSigue){
    document.getElementById("sigue").innerHTML = htmlSigue;
    cacheSigue = htmlSigue;
  }

  let htmlPrep = futuros.slice(1,3).map(e=>`
      <div class="item">
        ${e.nombre}
        <span class="hora">${formatoHora(e)}</span>
      </div>
    `).join("");

  if(htmlPrep !== cachePrep){
    document.getElementById("prep").innerHTML = htmlPrep;
    cachePrep = htmlPrep;
  }

  if(actuales.length){
    let e = actuales[0];
    let ini = horaAminutos(e.inicio);
    let fin = obtenerFin(e);

    let progreso = ((minutos-ini)/(fin-ini))*100;
    document.getElementById("barra").style.width = progreso + "%";

    let restante = (fin - minutos);
    document.getElementById("countdown").innerText =
      "Termina en " + restante + " min";
  }

}

// 🔁 INICIO
async function init(){
  eventos = await cargarEventos();
  console.log("EVENTOS:", eventos);
}

setInterval(actualizar, 1000);
setInterval(async ()=>{
  eventos = await cargarEventos();
}, 30000);

init();

</script>

</body>
</html>
