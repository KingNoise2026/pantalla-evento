<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pantalla Evento PRO</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family: Arial, sans-serif;
}

/* EN CURSO */
#enCurso {
  width:100%;
  text-align:center;
  font-size:80px;
  font-weight:bold;
  padding:30px 0;
  background:#111;
  border-bottom:4px solid #00ff00;
}

/* CONTENEDOR */
.container {
  display:flex;
  height:calc(100vh - 140px);
}

/* COLUMNAS */
.col {
  flex:1;
  padding:20px;
  box-sizing:border-box;
}

h2 {
  text-align:center;
  margin-bottom:20px;
}

/* 🔥 SCROLL SUAVE */
.scroll-container {
  height:100%;
  overflow:hidden;
  position:relative;
}

.scroll-content {
  position:absolute;
  width:100%;
  animation:scrollVertical 25s linear infinite;
}

@keyframes scrollVertical {
  0% { transform: translateY(0); }
  100% { transform: translateY(-50%); }
}

/* LISTAS */
ul {
  list-style:none;
  padding:0;
  margin:0;
  font-size:28px;
}

li {
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div id="enCurso">Cargando...</div>

<div class="container">
  <div class="col">
    <h2>EN PREPARACIÓN</h2>
    <div class="scroll-container">
      <div class="scroll-content">
        <ul id="preparacion"></ul>
      </div>
    </div>
  </div>

  <div class="col">
    <h2>EN ESCENARIO</h2>
    <div class="scroll-container">
      <div class="scroll-content">
        <ul id="escenario"></ul>
      </div>
    </div>
  </div>

  <div class="col">
    <h2>SIGUE</h2>
    <div class="scroll-container">
      <div class="scroll-content">
        <ul id="sigue"></ul>
      </div>
    </div>
  </div>
</div>

<script>
const sheetID = "TU_ID_AQUI";

const url = `https://docs.google.com/spreadsheets/d/e/${sheetID}/pub?output=csv`;

async function cargarDatos() {
  try {
    const res = await fetch(url + "&t=" + new Date().getTime());
    const text = await res.text();

    const separador = text.includes(";") ? ";" : ",";
    const filas = text.split("\n").map(f => f.split(separador));

    let preparacion = [];
    let escenario = [];
    let sigue = [];

    filas.slice(1).forEach(f => {
      const col0 = (f[0] || "").trim();
      const col1 = (f[1] || "").trim();
      const col2 = (f[2] || "").trim();

      if (col0) preparacion.push(col0);
      if (col1) escenario.push(col1);
      if (col2) sigue.push(col2);
    });

    document.getElementById("enCurso").innerText =
      escenario.length > 0 ? escenario[0] : "SIN ACTIVIDAD";

    pintarLista("preparacion", preparacion);
    pintarLista("escenario", escenario);
    pintarLista("sigue", sigue);

  } catch (error) {
    console.error(error);
  }
}

function pintarLista(id, datos) {
  const ul = document.getElementById(id);
  ul.innerHTML = "";

  datos.forEach(d => {
    const li = document.createElement("li");
    li.textContent = d;
    ul.appendChild(li);
  });

  // 🔥 DUPLICADO PARA SCROLL INFINITO SUAVE
  ul.innerHTML += ul.innerHTML;
}

setInterval(cargarDatos, 10000);
cargarDatos();
</script>

</body>
</html>
