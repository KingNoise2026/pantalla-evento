<script>
const sheetID = "TU_ID_AQUI";
const url = `https://docs.google.com/spreadsheets/d/e/${sheetID}/pub?output=csv`;

async function cargarDatos() {
  try {
    const res = await fetch(url + "&t=" + new Date().getTime());
    const text = await res.text();

    const separador = text.includes(";") ? ";" : ",";
    const filas = text.split("\n").map(f => f.split(separador));

    let preparacion = [];
    let escenario = [];
    let sigue = [];

    filas.slice(1).forEach(f => {
      const col0 = (f[0] || "").trim();
      const col1 = (f[1] || "").trim();
      const col2 = (f[2] || "").trim();

      if (col0 !== "") preparacion.push(col0);
      if (col1 !== "") escenario.push(col1);
      if (col2 !== "") sigue.push(col2);
    });

    // 🔥 DEBUG (puedes mirar en consola si quieres)
    console.log("ESCENARIO:", escenario);

    // 🔥 EN CURSO
    document.getElementById("enCurso").innerText =
      escenario.length > 0 ? escenario[0] : "SIN ACTIVIDAD";

    pintar("preparacion", preparacion);
    pintar("escenario", escenario);
    pintar("sigue", sigue);

  } catch (e) {
    console.error(e);
  }
}

function pintar(id, datos) {
  const ul = document.getElementById(id);
  ul.innerHTML = "";
  datos.forEach(d => {
    const li = document.createElement("li");
    li.textContent = d;
    ul.appendChild(li);
  });
}

setInterval(cargarDatos, 10000);
cargarDatos();
</script>
