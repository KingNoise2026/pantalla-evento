<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pantalla Evento LIVE - TEST</title>

<style>

/* 🔥 CAMBIO VISUAL FUERTE PARA TEST */
body {
  margin:0;
  background:#ff00ff !important;
  color:#00ff00;
  font-family: Arial, sans-serif;
  text-align:center;
}

/* 🔥 BORDES PARA VER SI ESTÁ ACTUALIZANDO */
.container {
  display:flex;
  flex-direction:column;
  justify-content:space-around;
  height:85vh;
  border:10px solid yellow;
}

.reloj {
  font-size:120px;
  font-weight:bold;
  color:white;
}

.bloque { padding:20px; border:5px solid white; }

.titulo { font-size:55px; margin-bottom:10px; }

.ahora { background:#ff0000; }
.sigue { background:#00ff00; }
.prep { background:#0000ff; }

.item { font-size:75px; margin:20px 0; }

.hora {
  font-size:70px;
  color:#fff;
  font-weight:bold;
  display:block;
}

.status {
  position:fixed;
  top:10px;
  left:10px;
  background:black;
  color:white;
  padding:10px;
  font-size:20px;
  z-index:9999;
}

</style>
</head>

<body>

<!-- 🔥 INDICADOR DE ARCHIVO ACTIVO -->
<div class="status">
SI VES ESTO → ESTE ARCHIVO SÍ ESTÁ CARGANDO
</div>

<!-- 🔥 TEST VISUAL -->
<h1 style="color:white; font-size:60px;">
ARCHIVO ACTIVO OK
</h1>

<div class="reloj" id="reloj"></div>

<div class="container">

<div class="bloque ahora">
<div class="titulo">EN ESCENARIO AHORA</div>
<div id="ahora">TEST AHORA</div>
</div>

<div class="bloque sigue">
<div class="titulo">SIGUE</div>
<div id="sigue">TEST SIGUE</div>
</div>

<div class="bloque prep">
<div class="titulo">EN PREPARACIÓN</div>
<div id="prep">TEST PREP</div>
</div>

</div>

<script>

// solo reloj para validar ejecución JS
function actualizarReloj(){
  const now = new Date();
  document.getElementById("reloj").innerText =
    now.toLocaleTimeString("es-CL");
}

setInterval(actualizarReloj, 1000);
actualizarReloj();

</script>

</body>
</html>
