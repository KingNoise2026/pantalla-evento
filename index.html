<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pantalla Evento PRO</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family: Arial;
  display:flex;
  flex-direction:column;
  height:100vh;
}

.reloj { font-size:70px; text-align:center; }

.container { flex:1; display:flex; flex-direction:column; }

.bloque { padding:10px; text-align:center; }

.ahora { background:#8B0000; flex:1; }
.sigue { background:#B8860B; flex:0.8; }
.prep { background:#1E3A8A; flex:1.2; display:flex; flex-direction:column; }

.prep-content { flex:1; overflow:hidden; position:relative; }

.scroll-content {
  position:absolute;
  width:100%;
}

.item { font-size:38px; margin:8px 0; }
.hora { font-size:26px; color:#ccc; }

.titulo { font-size:32px; font-weight:bold; }
</style>
</head>

<body>

<div class="reloj" id="reloj"></div>

<div class="container">

<div class="bloque ahora">
<div class="titulo">EN ESCENARIO</div>
<div id="ahora"></div>
</div>

<div class="bloque sigue">
<div class="titulo">SIGUE</div>
<div id="sigue"></div>
</div>

<div class="bloque prep">
<div class="titulo">EN PREPARACIÓN</div>
<div class="prep-content">
<div id="prep"></div>
</div>
</div>

</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRbNs0WU7BmaRXSQ0Bf9eS1DVIQ6yOmRTRio3Nx7yIZGbOLTmGL0JzI3XCiZeVvaQW4W222iY-W8dNV/pub?output=csv";

let eventos = [];
let scrollY = 0;
let velocidad = 0.4;

async function cargar(){
  const res = await fetch(URL + "&t=" + Date.now());
  const txt = await res.text();

  const filas = txt.split("\n").map(f=>f.trim()).filter(f=>f);

  eventos = filas.map(f=>{
    const c = f.split(",");
    return {
      inicio: c[0],
      nombre: c.slice(2).join(",")
    };
  });
}

function horaAminutos(h){
  const [hh,mm] = h.split(":").map(Number);
  return hh*60 + mm;
}

function reloj(){
  document.getElementById("reloj").innerText =
    new Date().toLocaleTimeString("es-CL");
}

function render(){
  const now = new Date();
  const minutos = now.getHours()*60 + now.getMinutes();

  eventos.sort((a,b)=>horaAminutos(a.inicio)-horaAminutos(b.inicio));

  let actuales = [];
  let futuros = [];

  eventos.forEach(e=>{
    let ini = horaAminutos(e.inicio);
    let fin = ini + 15; // duración por defecto

    if(minutos >= ini && minutos < fin) actuales.push(e);
    if(minutos < ini) futuros.push(e);
  });

  // EN ESCENARIO
  document.getElementById("ahora").innerHTML =
    actuales.length
      ? `<div class="item">${actuales[0].nombre}<div class="hora">${actuales[0].inicio}</div></div>`
      : "SIN ACTIVIDAD";

  // SIGUE
  document.getElementById("sigue").innerHTML =
    futuros[0]
      ? `<div class="item">${futuros[0].nombre}<div class="hora">${futuros[0].inicio}</div></div>`
      : "—";

  // PREPARACIÓN (scroll)
  let lista = futuros.slice(1);

  let html = lista.map(e=>`
    <div class="item">${e.nombre}<div class="hora">${e.inicio}</div></div>
  `).join("");

  document.getElementById("prep").innerHTML =
    `<div class="scroll-content">${html}${html}</div>`;

  scrollY = 0;
}

function scroll(){
  const cont = document.querySelector(".scroll-content");
  if(!cont){
    requestAnimationFrame(scroll);
    return;
  }

  scrollY += velocidad;

  if(scrollY >= cont.scrollHeight / 2){
    scrollY -= cont.scrollHeight / 2;
  }

  cont.style.transform = `translateY(-${scrollY}px)`;

  requestAnimationFrame(scroll);
}

async function init(){
  await cargar();
  render();
  scroll();
}

setInterval(reloj,1000);

// 🔥 IMPORTANTE: ahora sí re-renderiza
setInterval(async ()=>{
  await cargar();
  render();
}, 30000);

init();

</script>

</body>
</html>
