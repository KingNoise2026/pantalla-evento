<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pantalla Evento LIVE</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family: Arial, sans-serif;
  text-align:center;
}

.reloj {
  font-size:120px;
  font-weight:bold;
}

.container {
  display:flex;
  flex-direction:column;
  justify-content:space-around;
  height:85vh;
}

.bloque { padding:20px; }

.titulo { font-size:55px; margin-bottom:10px; }

.ahora { background:#8B0000; }
.sigue { background:#B8860B; }
.prep { background:#1E3A8A; }

.item { font-size:75px; margin:20px 0; }

.hora {
  font-size:70px;
  color:#ccc;
  font-weight:bold;
  display:block;
}

.progress {
  width:80%;
  height:20px;
  background:#333;
  margin:10px auto;
  border-radius:10px;
  overflow:hidden;
}

.progress-bar {
  height:100%;
  background:#00ff88;
  width:0%;
  transition: width 1s linear;
}

.countdown {
  font-size:40px;
  color:#00ff88;
}
</style>
</head>

<body>

<div class="reloj" id="reloj"></div>

<div class="container">

<div class="bloque ahora">
<div class="titulo">EN ESCENARIO AHORA</div>
<div id="ahora"></div>
<div class="progress"><div class="progress-bar" id="barra"></div></div>
<div class="countdown" id="countdown"></div>
</div>

<div class="bloque sigue">
<div class="titulo">SIGUE</div>
<div id="sigue"></div>
</div>

<div class="bloque prep">
<div class="titulo">EN PREPARACIÓN</div>
<div id="prep"></div>
</div>

</div>

<!-- BOTÓN MANUAL -->
<button onclick="forzarUpdate()" style="position:fixed;bottom:20px;right:20px;font-size:20px;padding:10px;">
🔄
</button>

<script>

// 🔥 TU GOOGLE SHEETS
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRbNs0WU7BmaRXSQ0Bf9eS1DVIQ6yOmRTRio3Nx7yIZGbOLTmGL0JzI3XCiZeVvaQW4W222iY-W8dNV/pub?output=csv";

const DURACION_DEFAULT = 15;

let eventos = [];

// 🔥 CARGA CON ANTI-CACHE
async function cargarEventos(){
  try {
    const res = await fetch(URL + "&t=" + new Date().getTime());
    const text = await res.text();

    const filas = text.split(/\r?\n/).slice(1);

    return filas.map(f=>{
      if(!f.trim()) return null;

      const columnas = f.split(",");

      return {
        inicio: columnas[0]?.replace(/"/g,"").trim(),
        fin: columnas[1]?.replace(/"/g,"").trim() || null,
        nombre: columnas.slice(2).join(",").replace(/"/g,"").trim()
      };

    }).filter(e => e && e.inicio && e.nombre);

  } catch(e){
    console.error("Error CSV:", e);
    return eventos;
  }
}

function horaAminutos(h){
  const [hh,mm]=h.split(":").map(Number);
  return hh*60+mm;
}

function obtenerFin(e){
  return e.fin ? horaAminutos(e.fin) : horaAminutos(e.inicio)+DURACION_DEFAULT;
}

function formatoHora(e){
  if(e.fin) return `${e.inicio} - ${e.fin}`;
  let f = obtenerFin(e);
  return `${e.inicio} - ${String(Math.floor(f/60)).padStart(2,"0")}:${String(f%60).padStart(2,"0")}`;
}

function actualizar(){
  const now = new Date();
  const minutos = now.getHours()*60 + now.getMinutes();

  document.getElementById("reloj").innerText =
    now.toLocaleTimeString("es-CL");

  let actuales=[], futuros=[];

  eventos.forEach(e=>{
    let ini = horaAminutos(e.inicio);
    let fin = obtenerFin(e);

    if(minutos>=ini && minutos<=fin) actuales.push(e);
    if(minutos<ini) futuros.push(e);
  });

  futuros.sort((a,b)=>horaAminutos(a.inicio)-horaAminutos(b.inicio));

  document.getElementById("ahora").innerHTML =
    actuales.map(e=>`<div class="item">${e.nombre}<span class="hora">${formatoHora(e)}</span></div>`).join("") || "—";

  document.getElementById("sigue").innerHTML =
    futuros[0] ? `<div class="item">${futuros[0].nombre}<span class="hora">${formatoHora(futuros[0])}</span></div>` : "—";

  document.getElementById("prep").innerHTML =
    futuros.slice(1,3).map(e=>`<div class="item">${e.nombre}<span class="hora">${formatoHora(e)}</span></div>`).join("");

  if(actuales[0]){
    let ini = horaAminutos(actuales[0].inicio);
    let fin = obtenerFin(actuales[0]);

    document.getElementById("barra").style.width =
      ((minutos-ini)/(fin-ini))*100 + "%";

    document.getElementById("countdown").innerText =
      "Termina en " + (fin-minutos) + " min";
  }
}

// 🔄 BOTÓN MANUAL
async function forzarUpdate(){
  eventos = await cargarEventos();
  actualizar();
}

// 🚀 INICIO
async function init(){
  eventos = await cargarEventos();
  actualizar();
}

// reloj en tiempo real
setInterval(actualizar, 1000);

// 🔥 refresco rápido (5 seg)
setInterval(async ()=>{
  eventos = await cargarEventos();
}, 5000);

init();

</script>

</body>
</html>
