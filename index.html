<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pantalla Evento LIVE</title>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family: Arial;
  text-align:center;
}

.reloj { font-size:90px; }

.item { font-size:40px; margin:10px 0; }

.prep {
  height:35vh;
  overflow:hidden;
  position:relative;
  background:#1E3A8A;
}

.scroll-content {
  position:absolute;
  width:100%;
  animation: scroll 20s linear infinite;
}

@keyframes scroll {
  0% { transform:translateY(0); }
  100% { transform:translateY(-50%); }
}
</style>
</head>

<body>

<h2 id="status">Conectando...</h2>
<div class="reloj" id="reloj"></div>

<div id="ahora"></div>
<div id="sigue"></div>
<div class="prep" id="prep"></div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRbNs0WU7BmaRXSQ0Bf9eS1DVIQ6yOmRTRio3Nx7yIZGbOLTmGL0JzI3XCiZeVvaQW4W222iY-W8dNV/pub?output=csv";

let eventos = [];

async function cargarEventos(){
  try{
    const res = await fetch(URL + "&t=" + Date.now());
    const text = await res.text();

    console.log("CSV RAW:", text); // 🔥 DEBUG

    const filas = text.split("\n");

    const data = [];

    for(let f of filas){
      f = f.trim();
      if(!f) continue;

      const partes = f.split(",");

      if(partes.length < 2) continue;

      data.push({
        inicio: partes[0],
        fin: partes[1],
        nombre: partes.slice(2).join(",")
      });
    }

    console.log("EVENTOS:", data); // 🔥 DEBUG

    document.getElementById("status").innerText = "🟢 OK ("+data.length+" filas)";
    return data;

  }catch(e){
    console.error(e);
    document.getElementById("status").innerText = "🔴 ERROR";
    return eventos;
  }
}

function horaAminutos(h){
  const [hh,mm]=h.split(":").map(Number);
  return hh*60+mm;
}

function actualizar(){
  const now = new Date();
  const min = now.getHours()*60 + now.getMinutes();

  document.getElementById("reloj").innerText =
    now.toLocaleTimeString("es-CL");

  let futuros = eventos.filter(e => horaAminutos(e.inicio) > min);

  document.getElementById("ahora").innerHTML =
    eventos[0] ? `<div class="item">${eventos[0].nombre}</div>` : "—";

  document.getElementById("sigue").innerHTML =
    futuros[0] ? `<div class="item">${futuros[0].nombre}</div>` : "—";

  let html = futuros.map(e=>`<div class="item">${e.nombre}</div>`).join("");

  document.getElementById("prep").innerHTML =
    `<div class="scroll-content">${html+html}</div>`;
}

async function init(){
  eventos = await cargarEventos();
  actualizar();
}

setInterval(actualizar,1000);
setInterval(async ()=>{
  eventos = await cargarEventos();
},10000);

init();

</script>

</body>
</html>
